<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rede delivery Ouro Branco</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14"></script>
    <style>
        :root { --primary: #00ff00; --bg: #0a0a0a; --card: #161616; --text: #e0e0e0; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; line-height: 1.5; }
        .container { max-width: 500px; margin: auto; padding: 15px; padding-bottom: 180px; }
        
        /* Header */
        .header { text-align: center; padding: 20px 0; border-bottom: 2px solid var(--primary); margin-bottom: 20px; }
        .header h1 { margin: 0; font-size: 22px; color: var(--primary); }
        .header h2 { margin: 5px 0 0 0; font-size: 16px; color: var(--text); }
        .min-aviso { color: #ff4444; font-weight: bold; font-size: 14px; margin-top: 10px;}

        /* Admin Toggle */
        .admin-toggle { position: absolute; top: 10px; right: 10px; opacity: 0.3; font-size: 10px; background: none; border: 1px solid white; color: white; cursor: pointer; }

        /* Estilo dos Cards */
        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; border-left: 5px solid var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .card h3 { margin: 0 0 10px 0; font-size: 16px; display: flex; align-items: center; gap: 8px; }
        
        input, select { width: 100%; padding: 12px; border-radius: 8px; background: #222; color: #fff; border: 1px solid #333; font-size: 15px; box-sizing: border-box; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: var(--primary); font-size: 13px; }

        /* Opções Qtd */
        .opcao-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #333; }
        .opcao-item:last-child { border-bottom: none; }
        .opcao-label { font-size: 14px; font-weight: bold; color: #ccc; }
        .qtd-control { display: flex; align-items: center; gap: 10px; }
        .qtd-btn { background: #333; color: white; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer; font-size: 16px; }
        .qtd-btn:hover { background: var(--primary); color: black; }
        .qtd-numero { font-size: 16px; font-weight: bold; min-width: 20px; text-align: center; }

        /* Resumo do Pedido */
        .resumo-container { background: #fff; color: #000; border-radius: 10px; padding: 15px; margin-top: 20px; position: relative; }
        .resumo-texto { white-space: pre-wrap; font-family: 'Courier New', Courier, monospace; font-size: 14px; font-weight: bold; }
        .btn-copiar { position: absolute; top: 10px; right: 10px; background: #007bff; color: white; border: none; padding: 6px 12px; border-radius: 5px; font-size: 12px; cursor: pointer; }

        /* Rodapé Fixo */
        .footer { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 500px; background: #000; border-top: 2px solid var(--primary); padding: 20px; box-sizing: border-box; text-align: center; z-index: 100;}
        .total-info { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 18px; font-weight: bold; }
        .btn-enviar { background: var(--primary); color: #000; border: none; width: 100%; padding: 16px; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .btn-enviar:disabled { background: #333; color: #777; cursor: not-allowed; }

        /* Admin Panel */
        .admin-panel { background: #1a1a1a; padding: 20px; border-radius: 10px; margin-top: 20px; }
    </style>
</head>
<body>

<div id="app" class="container">
    
    <!-- Botão Oculto para Admin -->
    <button class="admin-toggle" @click="isAdmin = !isAdmin">CONFIG</button>

    <!-- PAINEL ADMIN -->
    <div v-if="isAdmin" class="admin-panel">
        <h2 style="color: var(--primary)">Painel de Edição</h2>
        <label>Número do WhatsApp (com DDD):</label>
        <input v-model="config.whatsapp" placeholder="Ex: 5551994973157">
        <label>Chave PIX:</label>
        <input v-model="config.pix" placeholder="51980328408">
        <button @click="saveAdmin" class="btn-enviar" style="margin-top: 20px;">SALVAR E VOLTAR</button>
    </div>

    <!-- TELA DO CLIENTE -->
    <div v-else>
        <div class="header">
            <h1>Rede delivery Ouro Branco</h1>
            <h2>LISTA ATUALIZADA EM 21/04</h2>
            <p class="min-aviso">👉🏻 PEDIDO MÍNIMO: R$ 100</p>
        </div>

        <!-- Nome do Cliente -->
        <div class="card" style="border-left-color: #fff">
            <label>👤 NOME DO CLIENTE:</label>
            <input type="text" v-model="clienteNome" placeholder="usar numero cadastrado aqui nome completo?">
        </div>

        <!-- Lista de Produtos -->
        <div v-for="(prod, pIdx) in produtos" :key="pIdx" class="card">
            <h3>{{ prod.emoji }} {{ prod.nome }}</h3>
            <div v-for="(opt, oIdx) in prod.opcoes" :key="oIdx" class="opcao-item">
                <span class="opcao-label">{{ opt.label }} - R$ {{ opt.valor }}</span>
                <div class="qtd-control">
                    <button class="qtd-btn" @click="alterarQtd(pIdx, oIdx, -1)">-</button>
                    <span class="qtd-numero">{{ getQtd(pIdx, oIdx) }}</span>
                    <button class="qtd-btn" @click="alterarQtd(pIdx, oIdx, 1)">+</button>
                </div>
            </div>
        </div>

        <!-- Seleção de Cidade -->
        <div class="card" style="border-left-color: yellow">
            <h3>🏠 CIDADE / ENTREGA</h3>
            <select v-model="cidadeSelecionada">
                <option :value="null">Selecione sua cidade...</option>
                <option v-for="c in cidades" :value="c">
                    {{ c.nome }} ({{ c.sigla }}) - R$ {{ c.taxa }}
                </option>
            </select>
        </div>

        <!-- Prévia do Pedido -->
        <div v-if="totalGeral > 0" class="resumo-container">
            <button class="btn-copiar" @click="copiarTexto">COPIAR</button>
            <div class="resumo-texto">{{ textoFormatado }}</div>
        </div>

        <!-- Rodapé com Total -->
        <div class="footer">
            <div class="total-info">
                <span>TOTAL DO PEDIDO:</span>
                <span style="color: var(--primary)">R$ {{ totalGeral }}</span>
            </div>
            <button class="btn-enviar" :disabled="!podeFinalizar" @click="finalizarPedido">
                {{ totalGeral < 100 ? 'MÍNIMO R$ 100' : 'ENVIAR PARA WHATSAPP' }}
            </button>
        </div>
    </div>
</div>

    computed: {
        totalGeral() {
            let total = 0;
            Object.keys(this.quantidades).forEach(key => {
                const qtd = this.quantidades[key];
                if(qtd > 0) {
                    const [pIdx, oIdx] = key.split('_');
                    const opt = this.produtos[pIdx].opcoes[oIdx];
                    total += opt.valor * qtd;
                }
            });
            if(this.cidadeSelecionada) total += this.cidadeSelecionada.taxa;
            return total;
        },
        podeFinalizar() {
            return this.clienteNome.length > 2 && this.totalGeral >= 100 && this.cidadeSelecionada !== null;
        },
        textoFormatado() {
            if(!this.cidadeSelecionada) return "Selecione a cidade...";
            const data = new Date().toLocaleDateString('pt-BR');
            const hora = new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
            
            let msg = `👤 ${this.clienteNome || '---'}\n\n`;
            msg += `🏠 R$${this.cidadeSelecionada.taxa} ${this.cidadeSelecionada.nome} (${this.cidadeSelecionada.sigla})\n\n`;
            
            Object.keys(this.quantidades).forEach(key => {
                const qtd = this.quantidades[key];
                if(qtd > 0) {
                    const [pIdx, oIdx] = key.split('_');
                    const p = this.produtos[pIdx];
                    const opt = p.opcoes[oIdx];
                    msg += `${qtd}x ${p.emoji} ${opt.label} ${p.nome} $${opt.valor * qtd}\n`;
                }
            });
            
            msg += `\n💰 Total $${this.totalGeral} (no pix)\n\n`;
            msg += `🗓 ${data}\n`;
            msg += `⌚️ ${hora}`;
            return msg;
        }
    },
    methods: {
        getQtd(pIdx, oIdx) {
            const key = pIdx + '_' + oIdx;
            return this.quantidades[key] || 0;
        },
        alterarQtd(pIdx, oIdx, delta) {
            const key = pIdx + '_' + oIdx;
            let atual = this.quantidades[key] || 0;
            let nova = atual + delta;
            if (nova < 0) nova = 0;
            this.$set(this.quantidades, key, nova);
        },
        saveAdmin() {
            localStorage.setItem('config_pedido', JSON.stringify(this.config));
            this.isAdmin = false;
        },
        copiarTexto() {
            navigator.clipboard.writeText(this.textoFormatado);
            alert("Copiado com sucesso!");
        },
        finalizarPedido() {
            const final = `${this.textoFormatado}\n\n--- COMPROVANTE ABAIXO ---\nPIX: ${this.config.pix}`;
            const url = `https://wa.me/${this.config.whatsapp}?text=${encodeURIComponent(final)}`;
            window.open(url, '_blank');
        }
    },
    mounted() {
        const saved = localStorage.getItem('config_pedido');
        if(saved) this.config = JSON.parse(saved);
    }
});
</script>
</body>
